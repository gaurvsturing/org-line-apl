<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollo Engagement — Org Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============ Turing design tokens (design.md) ============ */
  :root{
    --color-blue:#2e6edf;
    --btn-bg-hero:#2f6ae3;
    --btn-bg-hero-hover:#004dc9;
    --color-blue-dark:#2961c4;
    --blue-20:#2137b4;
    --blue-60:#56a8f7;
    --blue-85:#a8ccf8;
    --blue-90:#dce6fa;
    --blue-95:#e9f3ff;
    --blue-97:#f8f8fe;
    --gray-0:#0f0f0f;
    --gray-10:#262626;
    --gray-30:#444444;
    --gray-40:#666666;
    --gray-60:#a3a3a8;
    --gray-85:#d9d9d9;
    --gray-90:#ededed;
    --gray-97:#f8f8f8;
    --color-text:#212121;
    --color-teal:#41bfad;
    --color-cyan:#3bd3e6;
    --color-indigo:#6c7bd4;
    --color-violet:#8a62d6;
    --color-green:#66cc80;
    --color-orange:#ed8138;
    --font-poppins:"Poppins",Arial,sans-serif;
    --radius-sm:4px; --radius-md:8px; --radius-lg:16px; --radius-pill:100px;
    --shadow-card:0px 8px 24px hsla(210,8%,62%,.2);
    --shadow-card-hover:0px 20px 25px -5px rgba(0,0,0,.1),0px 10px 10px 15px rgba(0,0,0,.04);
    --shadow-box:0px 1px 0px rgba(17,17,26,.05),0px 0px 8px rgba(17,17,26,.1);
    --shadow-hero:0 0 8px 0 rgba(47,106,227,.5);
    --shadow-blue-glow:0 0 52px 0 rgba(47,106,227,.5);
    --ease:cubic-bezier(.4,0,.2,1);
    --header-height:72px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--font-poppins);
    background:var(--gray-97);
    color:var(--color-text);
    font-size:16px;line-height:1.5;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important}}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-track{background-color:#e4e4e4;border-radius:10px}
  ::-webkit-scrollbar-thumb{border-radius:10px;background-color:#aaa}

  /* ============ header (72px, blurred glass) ============ */
  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:var(--header-height);
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--gray-90);
    display:flex;align-items:center;gap:24px;
    padding:0 32px;
  }
  .brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .brand-mark{
    width:36px;height:36px;border-radius:var(--radius-md);
    display:block;object-fit:cover;
    box-shadow:var(--shadow-box);
  }
  .brand-name{font-weight:600;font-size:16px;letter-spacing:-.025em;white-space:nowrap;color:var(--gray-0)}
  .brand-name span{color:var(--gray-40);font-weight:400}

  .search-wrap{position:relative;flex:1;min-width:180px;max-width:340px}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--gray-60);fill:none;stroke-width:2}
  #search{
    width:100%;padding:11px 32px 11px 34px;
    border:1px solid #cccccc;border-radius:var(--radius-sm);
    font-family:var(--font-poppins);font-size:14px;color:var(--color-text);
    background:transparent;outline:none;
    transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
  }
  #search::placeholder{color:#a3a3a8;opacity:.9}
  #search:focus{border-color:var(--color-blue);box-shadow:0 0 8px 0 rgba(47,106,227,.25);background:#fff}
  #clearSearch{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    border:none;background:none;color:var(--gray-60);cursor:pointer;
    font-size:15px;padding:2px 6px;border-radius:var(--radius-sm);display:none;
  }
  #clearSearch:hover{color:var(--color-text);background:var(--gray-90)}

  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--gray-40);font-weight:500}
  .legend .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  .header-btns{display:flex;gap:8px;margin-left:auto}
  .hbtn{
    border:1px solid var(--gray-0);background:transparent;color:var(--gray-0);
    font-family:var(--font-poppins);font-size:13px;font-weight:500;letter-spacing:.04em;
    padding:9px 16px;border-radius:var(--radius-sm);cursor:pointer;
    transition:all .2s var(--ease);white-space:nowrap;
  }
  .hbtn:hover{background:var(--gray-97)}
  .hbtn.primary{background:var(--btn-bg-hero);border-color:var(--btn-bg-hero);color:#fff}
  .hbtn.primary:hover{background:var(--btn-bg-hero-hover);border-color:var(--btn-bg-hero-hover);box-shadow:var(--shadow-hero)}

  /* ============ canvas ============ */
  #viewport{
    position:absolute;inset:0;top:var(--header-height);
    overflow:auto;cursor:grab;
  }
  #viewport.dragging{cursor:grabbing;user-select:none}
  #canvas{padding:56px 64px 140px;min-width:max-content}

  .tree{display:flex;flex-direction:column;align-items:center}

  /* root node — dark Turing hero with blue glow */
  .root-node{
    background:linear-gradient(180deg,rgba(47,106,227,0) -36.29%,rgba(47,106,227,.3) 269.39%),
               linear-gradient(0deg,#010512 10.63%,rgba(1,5,18,0) 120.35%),#0f0f0f;
    color:#fff;border-radius:var(--radius-lg);
    border:1px solid rgba(83,82,82,.6);
    padding:22px 44px;text-align:center;
    box-shadow:var(--shadow-blue-glow);
    cursor:pointer;transition:transform .15s var(--ease);
  }
  .root-node:hover{transform:translateY(-2px)}
  .root-node .r-logo{
    display:inline-block;background:#fff;border-radius:var(--radius-md);
    padding:9px 18px;margin-bottom:14px;
  }
  .root-node .r-logo img{height:24px;display:block}
  .root-node .r-title{font-size:21px;font-weight:600;letter-spacing:-.5px}
  .root-node .r-sub{font-size:13px;color:var(--gray-60);margin-top:4px;font-weight:400}

  .trunk{width:2px;height:32px;background:var(--gray-85)}

  .streams-row{display:flex;align-items:flex-start;gap:24px;position:relative;padding-top:32px}
  .streams-row::before{
    content:"";position:absolute;top:0;height:2px;background:var(--gray-85);
    left:var(--line-left,0);right:var(--line-right,0);
  }
  .stream-col{display:flex;flex-direction:column;align-items:center;position:relative}
  .stream-col::before{
    content:"";position:absolute;top:-32px;width:2px;height:32px;background:var(--gray-85);
    left:50%;transform:translateX(-50%);
  }

  /* ============ stream card ============ */
  .stream-card{
    width:248px;
    background:#fff;
    border:1px solid #eeeeee;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);
    cursor:pointer;overflow:hidden;
    transition:box-shadow .15s var(--ease),transform .15s var(--ease);
  }
  .stream-card:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-2px)}
  .stream-head{padding:16px 16px 14px}
  .stream-name{font-size:15px;font-weight:600;letter-spacing:-.025em;line-height:1.35;color:var(--gray-0);display:flex;align-items:center;gap:8px}
  .stream-name .s-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--stream-accent,var(--color-blue))}
  .chev{margin-left:auto;transition:transform .2s var(--ease);color:var(--gray-60);flex-shrink:0}
  .stream-col.open .chev{transform:rotate(180deg)}

  .stream-body{
    display:none;border-top:1px solid var(--gray-90);
    padding:12px;background:var(--blue-97);cursor:default;
  }
  .stream-col.open .stream-body{display:block}

  .sec-label{
    font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
    color:var(--gray-40);margin:10px 2px 7px;
  }
  .zone-label{
    font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
    margin:2px 2px 8px;
  }
  .zone-label.apollo{color:#1d7a4f}   /* Apollo brand green */
  .zone-label.turing{color:var(--color-blue)}
  .v-connect{width:2px;height:18px;background:var(--gray-85);margin:0 auto}
  .turing-zone{
    background:#fff;border:1px solid var(--gray-90);
    border-radius:var(--radius-md);padding:8px 8px 2px;
  }
  .turing-zone .sec-label:first-of-type{margin-top:2px}

  /* ---- mini person card (inside stream) ---- */
  .person{
    display:flex;align-items:center;gap:10px;
    background:#fff;border:1px solid #eeeeee;border-radius:var(--radius-md);
    padding:9px 10px;margin-bottom:7px;
    cursor:pointer;
    box-shadow:0px 2px 4px rgba(0,0,0,.05);
    transition:all .15s var(--ease);
  }
  .person:hover{box-shadow:var(--shadow-card);transform:translateY(-1px);border-color:var(--blue-85)}
  .person.selected{border-color:var(--color-blue);box-shadow:var(--shadow-hero)}
  .person .p-text{min-width:0}
  .person .p-name{font-size:13px;font-weight:500;color:var(--gray-0);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person .p-title{font-size:11px;color:var(--gray-40);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person .chip{margin-left:auto}

  /* stakeholder zone (client side, sits on top) */
  .client-zone{
    background:var(--blue-95);border:1px solid var(--blue-90);
    border-radius:var(--radius-md);padding:8px 8px 2px;
  }
  .client-zone .person{background:#fff}

  /* stakeholder rows: everyone in a row is at the same level */
  .stream-card.wide{width:324px}
  .tier-row{display:flex;gap:7px;margin-bottom:7px}
  .tier-row.has-connect{margin-bottom:0}
  .tier-row .person{
    flex:1;min-width:0;flex-direction:column;text-align:center;
    gap:5px;padding:9px 6px;margin-bottom:0;
  }
  .tier-row .p-text{width:100%}
  .tier-row .p-name{font-size:11.5px}
  .tier-row .p-title{font-size:10px}

  /* branching connector between tiers: a stub touches every box above and below */
  .tier-connect{position:relative;height:24px}
  .tier-connect i{position:absolute;background:var(--gray-85)}
  .tier-connect .tc-bar{top:50%;height:2px;margin-top:-1px}
  .tier-connect .tc-up{top:0;bottom:50%;width:2px;transform:translateX(-50%)}
  .tier-connect .tc-down{top:50%;bottom:0;width:2px;transform:translateX(-50%)}

  /* ============ Apollo internal hierarchy tree ============ */
  .otree ul{
    display:flex;justify-content:center;align-items:flex-start;
    list-style:none;position:relative;padding:26px 0 0;margin:0;
  }
  .otree ul::before{
    content:"";position:absolute;top:0;left:50%;width:2px;height:26px;
    background:var(--gray-85);transform:translateX(-50%);
  }
  .otree li{
    display:flex;flex-direction:column;align-items:center;
    position:relative;padding:26px 5px 0;
  }
  .otree li::before,.otree li::after{
    content:"";position:absolute;top:0;right:50%;width:50%;height:26px;
    border-top:2px solid var(--gray-85);
  }
  .otree li::after{right:auto;left:50%;border-left:2px solid var(--gray-85)}
  .otree li:only-child{padding-top:0}
  .otree li:only-child::before,.otree li:only-child::after{display:none}
  .otree li:first-child::before,.otree li:last-child::after{border:0 none}
  .otree li:last-child::before{border-right:2px solid var(--gray-85)}

  .hnode{
    flex-direction:column;text-align:center;gap:5px;
    width:128px;padding:9px 6px;margin-bottom:0;
  }
  .hnode .p-text{width:100%}
  .hnode .p-name{font-size:11.5px;white-space:normal;line-height:1.25}
  .hnode .p-title{font-size:10px}

  /* toggle: Apollo hierarchy only */
  body.apollo-only .trunk,body.apollo-only .streams-row{display:none}
  .empty-note{font-size:12px;color:var(--gray-60);font-style:italic;padding:2px 4px 8px}

  /* ============ avatars ============ */
  .avatar{
    border-radius:50%;flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:var(--blue-90);color:var(--blue-20);font-weight:600;
  }
  .avatar img{width:100%;height:100%;object-fit:cover}
  .avatar.lead{background:var(--btn-bg-hero);color:#fff}
  .avatar.stake{background:var(--gray-0);color:#fff}
  .av-32{width:32px;height:32px;font-size:12px}
  .av-72{width:72px;height:72px;font-size:24px}

  /* ============ chips ============ */
  .chip{
    display:inline-block;font-size:10px;line-height:17px;font-weight:600;letter-spacing:.7px;
    padding:0 8px;border-radius:9px;white-space:nowrap;text-transform:uppercase;
    box-shadow:0px 2px 4px rgba(0,0,0,.078);flex-shrink:0;
  }
  .chip-lead{background:var(--btn-bg-hero);color:#fff}
  .chip-pm{background:var(--color-indigo);color:#fff}
  .chip-member{background:var(--gray-85);color:var(--gray-30)}
  .chip-stake{background:var(--gray-0);color:#fff}

  /* search dimming */
  .stream-col.dimmed{opacity:.22}
  .person.match{border-color:var(--color-blue);background:var(--blue-95)}

  /* ============ side panel ============ */
  #panel{
    position:fixed;top:var(--header-height);right:0;bottom:0;width:340px;z-index:80;
    background:#fff;border-left:1px solid var(--gray-90);
    box-shadow:-8px 0 24px hsla(210,8%,62%,.2);
    transform:translateX(100%);transition:transform .25s var(--ease);
    padding:28px 24px;overflow-y:auto;
  }
  #panel.open{transform:translateX(0)}
  #panelClose{
    position:absolute;top:16px;right:16px;
    border:none;background:var(--gray-97);color:var(--gray-40);
    width:28px;height:28px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;
    transition:all .15s var(--ease);
  }
  #panelClose:hover{background:var(--gray-90);color:var(--gray-0)}
  #panelAvatar{margin-bottom:14px}
  #panelName{font-size:22px;font-weight:600;letter-spacing:-.5px;color:var(--gray-0);line-height:1.3}
  #panelTitle{font-size:13px;color:var(--gray-40);margin-top:2px}
  #panelChips{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  #panelBio{font-size:13px;color:var(--gray-30);line-height:1.6;margin-top:14px}
  .panel-actions{margin-top:16px;display:flex;gap:8px}
  .btn-linkedin{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--btn-bg-hero);color:#fff;
    font-family:var(--font-poppins);font-size:13px;font-weight:500;letter-spacing:.04em;
    padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--btn-bg-hero);
    cursor:pointer;text-decoration:none;
    transition:all .2s var(--ease);
  }
  .btn-linkedin:hover{background:var(--btn-bg-hero-hover);border-color:var(--btn-bg-hero-hover);box-shadow:var(--shadow-hero)}
  .btn-linkedin svg{width:14px;height:14px;fill:currentColor}
  .btn-linkedin.disabled{background:var(--gray-90);border-color:var(--gray-90);color:var(--gray-60);cursor:default;box-shadow:none}
  .panel-sec{margin-top:26px}
  .panel-sec h4{
    font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
    color:var(--gray-40);margin-bottom:10px;
  }
  .panel-chip{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:11px 13px;border-radius:var(--radius-md);margin-bottom:7px;
    background:var(--blue-97);border:1px solid #eeeeee;
    border-left:3px solid var(--chip-accent,var(--color-blue));
    font-size:13px;font-weight:500;color:var(--gray-0);
    cursor:pointer;transition:all .15s var(--ease);
  }
  .panel-chip:hover{box-shadow:var(--shadow-card);transform:translateY(-1px)}
  .panel-chip .chip-role{font-size:10px;font-weight:600;color:var(--gray-40);text-transform:uppercase;letter-spacing:.7px;text-align:right}

  footer.hint{
    position:fixed;bottom:0;left:0;right:0;z-index:70;
    padding:8px 32px;font-size:12px;color:var(--gray-40);
    background:linear-gradient(to top,var(--gray-97) 55%,transparent);
    pointer-events:none;
  }
</style>
</head>

/* ---------- derived index: person -> appearances ---------- */
const roleIndex = {};
function idx(name, stream, role, level){
  (roleIndex[name] = roleIndex[name] || []).push({ stream, role, level });
}
STREAMS.forEach(s => {
  s.techLeads.forEach(n => idx(n, s.name, "Tech Lead"));
  s.members.forEach(m => idx(m.name, s.name, m.role === "PM" ? "PM" : "Team Member"));
  s.stakeholders.forEach(st => idx(st.name, s.name, "Apollo Stakeholder", st.level));
});

function initials(n){ return n.trim().split(/\s+/).map(w => w[0]).slice(0,2).join("").toUpperCase(); }

/* auto-description when bio is blank: factual, from the data */
function autoBio(name){
  const e = roleIndex[name] || [];
  const leads  = e.filter(x => x.role === "Tech Lead").map(x => x.stream);
  const pms    = e.filter(x => x.role === "PM").map(x => x.stream);
  const member = e.filter(x => x.role === "Team Member").map(x => x.stream);
  const stake  = e.filter(x => x.role === "Apollo Stakeholder").map(x => x.stream);
  const parts = [];
  if (leads.length)  parts.push("Tech Lead for " + leads.join(" and "));
  if (pms.length)    parts.push("Program Manager for " + pms.join(" and "));
  if (member.length) parts.push((parts.length ? "also on " : "Delivery team member on ") + member.join(" and "));
  if (stake.length)  parts.push("Apollo-side stakeholder for " + stake.join(" and "));
  if (!parts.length && name in APOLLO_REPORTING) {
    const reports = Object.keys(APOLLO_REPORTING).filter(k => APOLLO_REPORTING[k] === name);
    return "Apollo leadership" + (reports.length ? " — manages " + reports.join(", ") : "") + ".";
  }
  return parts.join("; ") + ".";
}

function makeAvatar(name, sizeCls, variant){
  const p = PEOPLE[name] || {};
  const div = document.createElement("div");
  div.className = "avatar " + sizeCls + (variant ? " " + variant : "");
  if (p.photo) {
    const img = document.createElement("img");
    img.src = p.photo; img.alt = name;
    div.appendChild(img);
  } else div.textContent = initials(name);
  return div;
}

function chipEl(cls, text){
  const s = document.createElement("span");
  s.className = "chip " + cls; s.textContent = text;
  return s;
}

/* org-chart join between two tier rows: horizontal bar with a vertical
   stub touching the center of every box above and every box below */
function tierConnect(nTop, nBottom){
  const c = document.createElement("div");
  c.className = "tier-connect";
  const centers = n => Array.from({ length: n }, (_, i) => 100 * (2 * i + 1) / (2 * n));
  const top = centers(nTop), bottom = centers(nBottom);
  const all = top.concat(bottom);
  const bar = document.createElement("i");
  bar.className = "tc-bar";
  bar.style.left = Math.min(...all) + "%";
  bar.style.right = (100 - Math.max(...all)) + "%";
  c.appendChild(bar);
  top.forEach(x => {
    const s = document.createElement("i");
    s.className = "tc-up"; s.style.left = x + "%";
    c.appendChild(s);
  });
  bottom.forEach(x => {
    const s = document.createElement("i");
    s.className = "tc-down"; s.style.left = x + "%";
    c.appendChild(s);
  });
  return c;
}

function hnodeCard(name){
  const p = PEOPLE[name] || {};
  const d = document.createElement("div");
  d.className = "person hnode";
  d.dataset.name = name.toLowerCase();
  d.appendChild(makeAvatar(name, "av-32", "stake"));
  const txt = document.createElement("div");
  txt.className = "p-text";

  nm.className = "p-name"; nm.textContent = name;
  const tt = document.createElement("div");
  tt.className = "p-title"; tt.textContent = p.title || "Apollo";
  txt.appendChild(nm); txt.appendChild(tt);
  d.appendChild(txt);
  d.addEventListener("click", e => { e.stopPropagation(); openPanel(name); });
  return d;
}

function hierNode(name){
  const li = document.createElement("li");
  li.appendChild(hnodeCard(name));
  const kids = REPORTS_OF[name] || [];
  if (kids.length){
    const ul = document.createElement("ul");
    kids.forEach(k => ul.appendChild(hierNode(k)));
    li.appendChild(ul);
  }
  return li;
}

const treeUl = document.createElement("ul");
Object.keys(APOLLO_REPORTING)
  .filter(n => !APOLLO_REPORTING[n])
  .forEach(r => treeUl.appendChild(hierNode(r)));

/* connector line: span from center of first column to center of last */
function fitConnector(){
  const cols = row.querySelectorAll(".stream-col");
  if (cols.length < 2) return;
  const first = cols[0], last = cols[cols.length - 1];
  row.style.setProperty("--line-left", (first.offsetLeft + first.offsetWidth / 2) + "px");
  row.style.setProperty("--line-right", (row.scrollWidth - last.offsetLeft - last.offsetWidth / 2) + "px");
}
fitConnector();
window.addEventListener("resize", fitConnector);

/* ---------- search ---------- */
const searchInput = document.getElementById("search");
const clearBtn = document.getElementById("clearSearch");

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.style.display = q ? "block" : "none";

  document.querySelectorAll(".person").forEach(p => p.classList.remove("match"));

  document.querySelectorAll(".stream-col").forEach(col => {
    if (!q) { col.classList.remove("dimmed"); return; }

    const streamHit = col.dataset.stream.includes(q);
    let personHit = false;
    col.querySelectorAll(".person").forEach(p => {
      if (p.dataset.name.includes(q)) { p.classList.add("match"); personHit = true; }
    });

    if (streamHit || personHit) {
      col.classList.remove("dimmed");
      col.classList.add("open");
    } else {
      col.classList.add("dimmed");
    }
  });

  /* also highlight matches in the Apollo hierarchy tree */
  document.querySelectorAll(".otree .person").forEach(p =>
    p.classList.toggle("match", !!q && p.dataset.name.includes(q)));

  fitConnector();
});
clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  searchInput.dispatchEvent(new Event("input"));
  searchInput.focus();
});

const panel = document.getElementById("panel");
const LI_ICON = '<svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.3 18.4v-7.9H5.7v7.9h2.6zM7 9.4a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm11.4 9v-4.5c0-2.4-1.3-3.6-3-3.6-1.4 0-2 .8-2.4 1.3v-1.1h-2.6c0 .7 0 7.9 0 7.9H13v-4.4c0-.2 0-.5.1-.6.2-.5.6-1 1.4-1 1 0 1.3.7 1.3 1.8v4.2h2.6z"/></svg>';

function openPanel(name){
  const p = PEOPLE[name] || {};
  const entries = roleIndex[name] || [];

  const avatarHost = document.getElementById("panelAvatar");
  avatarHost.innerHTML = "";
  avatarHost.className = "avatar av-72" +
    (entries.some(e => e.role === "Tech Lead") ? " lead" :
     entries.every(e => e.role === "Apollo Stakeholder") ? " stake" : "");
  if (p.photo) {
    const img = document.createElement("img"); img.src = p.photo; img.alt = name;
    avatarHost.appendChild(img);
  } else avatarHost.textContent = initials(name);

  document.getElementById("panelName").textContent = name;
  document.getElementById("panelTitle").textContent =
    p.title || (entries.every(e => e.role === "Apollo Stakeholder") ? "Apollo" : "Turing");

  const chipsHost = document.getElementById("panelChips");
  chipsHost.innerHTML = "";
  [...new Set(entries.map(e => e.role))].forEach(r => {
    const cls = r === "Tech Lead" ? "chip-lead" : r === "PM" ? "chip-pm" :
                r === "Apollo Stakeholder" ? "chip-stake" : "chip-member";
    chipsHost.appendChild(chipEl(cls, r));
  });
  if (!entries.length && name in APOLLO_REPORTING)
    chipsHost.appendChild(chipEl("chip-stake", "Apollo Leadership"));

  document.getElementById("panelBio").textContent = p.bio || autoBio(name);

  const actions = document.getElementById("panelActions");
  actions.innerHTML = p.linkedin
    ? '<a class="btn-linkedin" href="' + p.linkedin.replace(/"/g, "&quot;") + '" target="_blank" rel="noopener">' + LI_ICON + 'LinkedIn Profile</a>'
    : '<span class="btn-linkedin disabled" title="Add the LinkedIn URL in the PEOPLE data block">' + LI_ICON + 'LinkedIn — not added</span>';

  const body = document.getElementById("panelBody");
  body.innerHTML = "";
  if (entries.length) {
    const sec = document.createElement("div");
    sec.className = "panel-sec";
    sec.innerHTML = "<h4>Streams (" + entries.length + ")</h4>";
    entries.forEach(e => {
      const stream = STREAMS.find(s => s.name === e.stream);
      const chip = document.createElement("div");
      chip.className = "panel-chip";
      chip.style.setProperty("--chip-accent", stream ? stream.accent : "var(--color-blue)");
      chip.innerHTML = "<span>" + e.stream + "</span><span class='chip-role'>" + e.role + "</span>";
      chip.addEventListener("click", () => {
        const col = document.querySelector('.stream-col[data-stream="' + e.stream.toLowerCase() + '"]');
        if (col) {
          col.classList.add("open"); fitConnector();
          col.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        }
      });
      sec.appendChild(chip);
    });
    body.appendChild(sec);
  }

  /* Apollo reporting line + direct reports (from APOLLO_REPORTING) */
  if (Object.prototype.hasOwnProperty.call(APOLLO_REPORTING, name)) {
    const chain = [];
    let cur = APOLLO_REPORTING[name];
    while (cur) { chain.push(cur); cur = APOLLO_REPORTING[cur]; }
    if (chain.length) {
      const rs = document.createElement("div");
      rs.className = "panel-sec";
      rs.innerHTML = "<h4>Reporting Line</h4>";
      chain.forEach((mgr, i) => {
        const chip = document.createElement("div");
        chip.className = "panel-chip";
        chip.style.setProperty("--chip-accent", "var(--gray-0)");
        chip.innerHTML = "<span>" + mgr + "</span><span class='chip-role'>" +
          (i === 0 ? "Manager" : "Level " + (i + 1)) + "</span>";
        chip.addEventListener("click", () => openPanel(mgr));
        rs.appendChild(chip);
      });
      body.appendChild(rs);
    }
    const reports = Object.keys(APOLLO_REPORTING).filter(k => APOLLO_REPORTING[k] === name);
    if (reports.length) {
      const ds = document.createElement("div");
      ds.className = "panel-sec";
      ds.innerHTML = "<h4>Direct Reports (" + reports.length + ")</h4>";
      reports.forEach(r => {
        const chip = document.createElement("div");
        chip.className = "panel-chip";
        chip.style.setProperty("--chip-accent", "var(--gray-0)");
        chip.innerHTML = "<span>" + r + "</span><span class='chip-role'>Apollo</span>";
        chip.addEventListener("click", () => openPanel(r));
        ds.appendChild(chip);
      });
      body.appendChild(ds);
    }
  }

  document.querySelectorAll(".person").forEach(pe =>
    pe.classList.toggle("selected", pe.dataset.name === name.toLowerCase()));
  panel.classList.add("open");
}
document.getElementById("panelClose").addEventListener("click", closePanel);
function closePanel(){
  panel.classList.remove("open");
  document.querySelectorAll(".person.selected").forEach(p => p.classList.remove("selected"));
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

/* ---------- drag to pan ---------- */
const vp = document.getElementById("viewport");
let dragging = false, startX = 0, startY = 0, scrollL = 0, scrollT = 0;
vp.addEventListener("mousedown", e => {
  if (e.target.closest(".stream-card, .root-node, .person, #panel")) return;
  dragging = true;
  vp.classList.add("dragging");
  startX = e.pageX; startY = e.pageY;
  scrollL = vp.scrollLeft; scrollT = vp.scrollTop;
});
document.addEventListener("mousemove", e => {
  if (!dragging) return;
  vp.scrollLeft = scrollL - (e.pageX - startX);
  vp.scrollTop = scrollT - (e.pageY - startY);
});
document.addEventListener("mouseup", () => { dragging = false; vp.classList.remove("dragging"); });
</script>
</body>
</html>
